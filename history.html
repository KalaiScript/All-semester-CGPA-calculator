<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | EduGradeX</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#2f80ed">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <input type="file" id="import-input" style="display: none;" accept=".json" onchange="handleImport(this)">
        <!-- Header -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <a href="index.html" style="color: var(--text-muted); font-size: 1.5rem;">
                <!-- Back Arrow Icon -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
                <h2 style="margin: 0; font-size: 1.2rem;">History</h2>
                <div style="display: flex; gap: 10px;">
                    <a href="#" onclick="exportHistory()" style="font-size: 0.8rem; color: var(--accent-green);">Export</a>
                    <a href="#" onclick="importHistory()" style="font-size: 0.8rem; color: var(--primary-color);">Import</a>
                    <a href="#" onclick="clearHistory()" style="font-size: 0.8rem; color: #ff5252;">Clear All</a>
                </div>
            </div>
        </div>

        <!-- History List -->
        <div id="history-list" style="display: flex; flex-direction: column; gap: 15px;">
            <!-- History Items will be injected here -->
            <div class="card" style="text-align: center; color: var(--text-muted); padding: 40px;">
                <p>No calculations yet.</p>
            </div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
    <!-- script.js handles the initial renderHistory call via syncFirebaseHistory -->
</body>

</html>
